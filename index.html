<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ريالك | الإدارة المالية الاحترافية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --gold: #c5a059; --bg: #05080a; --card: rgba(22, 27, 42, 0.7); --text: #e0e0e0; }
        body { font-family: 'Tajawal', sans-serif; background: radial-gradient(circle at top, #161b2a, var(--bg)); color: var(--text); min-height: 100vh; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-container { max-width: 900px; width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .app-container { grid-template-columns: 1fr; } }
        
        .card { background: var(--card); backdrop-filter: blur(10px); border-radius: 24px; padding: 30px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h1 { font-weight: 700; color: var(--gold); margin-top: 0; font-size: 1.8rem; letter-spacing: 1px; }
        
        .input-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 10px; font-weight: 500; opacity: 0.9; }
        .main-input { width: 100%; background: rgba(0,0,0,0.3); border: 2px solid #2d3446; border-radius: 15px; padding: 15px; color: var(--gold); font-size: 1.5rem; text-align: center; transition: 0.3s; box-sizing: border-box;}
        .main-input:focus { border-color: var(--gold); outline: none; box-shadow: 0 0 15px rgba(197, 160, 89, 0.3); }

        .slider-section { margin-top: 20px; }
        .control-row { margin-bottom: 15px; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; }
        input[type="range"] { width: 100%; accent-color: var(--gold); }
        .val-text { float: left; color: var(--gold); font-weight: bold; }

        .chart-container { display: flex; flex-direction: column; align-items: center; justify-content: center; position: sticky; top: 20px; height: fit-content;}
        canvas { max-width: 100% !important; }
        
        .status-badge { display: inline-block; padding: 5px 15px; border-radius: 50px; font-size: 0.8rem; margin-top: 10px; }
        .safe { background: rgba(0, 255, 127, 0.1); color: #00ff7f; }
        .danger { background: rgba(255, 77, 77, 0.1); color: #ff4d4d; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="card">
        <h1>ريالك 💰</h1>
        <div class="input-group">
            <label>الراتب الشهري الرئيسي</label>
            <input type="number" id="salary" class="main-input" placeholder="0.00" oninput="updateAll()">
        </div>

        <div class="slider-section">
            <div class="control-row">
                <label>🏠 الضروريات <span id="p1_v" class="val-text">50%</span></label>
                <input type="range" id="p1" min="0" max="100" value="50" oninput="updateAll()">
            </div>
            <div class="control-row">
                <label>📈 الادخار والاستثمار <span id="p2_v" class="val-text">20%</span></label>
                <input type="range" id="p2" min="0" max="100" value="20" oninput="updateAll()">
            </div>
            <div class="control-row">
                <label>☕ نمط الحياة والترفيه <span id="p3_v" class="val-text">30%</span></label>
                <input type="range" id="p3" min="0" max="100" value="30" oninput="updateAll()">
            </div>
        </div>

        <div id="status" class="status-badge safe">الميزانية متزنة 100%</div>
    </div>

    <div class="card chart-container">
        <canvas id="myChart"></canvas>
        <div style="margin-top: 20px; width: 100%;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <span>المبلغ المتبقي:</span>
                <span id="rem_val" style="color: var(--gold); font-weight: bold;">0 ر.س</span>
            </div>
        </div>
    </div>
</div>

<script>
    let myChart;
    
    // تشغيل النظام عند تحميل الصفحة
    window.onload = function() {
        initChart();
        loadSavedData();
        updateAll();
    };

    function initChart() {
        const ctx = document.getElementById('myChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['ضروريات', 'ادخار', 'ترفيه'],
                datasets: [{
                    data: [50, 20, 30],
                    backgroundColor: ['#c5a059', '#1e293b', '#334155'],
                    borderWidth: 0,
                    hoverOffset: 20
                }]
            },
            options: {
                plugins: { legend: { display: false } },
                cutout: '70%'
            }
        });
    }

    function updateAll() {
        const salary = document.getElementById('salary').value || 0;
        const p1 = parseInt(document.getElementById('p1').value);
        const p2 = parseInt(document.getElementById('p2').value);
        const p3 = parseInt(document.getElementById('p3').value);
        const total = p1 + p2 + p3;

        // تحديث النصوص
        document.getElementById('p1_v').innerText = p1 + "%";
        document.getElementById('p2_v').innerText = p2 + "%";
        document.getElementById('p3_v').innerText = p3 + "%";

        // تحديث الحالة
        const status = document.getElementById('status');
        status.innerText = `إجمالي التوزيع: ${total}%`;
        status.className = total > 100 ? 'status-badge danger' : 'status-badge safe';

        // تحديث الرسم البياني
        myChart.data.datasets[0].data = [p1, p2, p3];
        myChart.update();

        // حساب المبالغ
        const rem = salary * (total/100);
        document.getElementById('rem_val').innerText = Math.round(rem).toLocaleString() + " ر.س";

        // حفظ البيانات تلقائياً (LocalStorage)
        localStorage.setItem('ryalk_data', JSON.stringify({salary, p1, p2, p3}));
    }

    function loadSavedData() {
        const saved = localStorage.getItem('ryalk_data');
        if (saved) {
            const data = JSON.parse(saved);
            document.getElementById('salary').value = data.salary;
            document.getElementById('p1').value = data.p1;
            document.getElementById('p2').value = data.p2;
            document.getElementById('p3').value = data.p3;
        }
    }
</script>

</body>
</html>
