    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ريالك | النسخة الاحترافية</title>
   <meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ريالك">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2454/2454269.png">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --gold: #d4af37; --gold-glow: rgba(212, 175, 55, 0.4);
            --bg: #030508; --card-bg: rgba(15, 20, 30, 0.8); --text: #f0f0f0;
        }

        body { 
            font-family: 'Tajawal', sans-serif; background-color: var(--bg); 
            color: var(--text); margin: 0; overflow-x: hidden; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        /* خلفية النجوم المتحركة */
        #canvas-bg { position: fixed; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; }

        .main-wrapper { 
            width: 95%; max-width: 1100px; display: grid; 
            grid-template-columns: 1fr 1fr; gap: 30px; padding: 20px;
            animation: fadeIn 1.5s ease-out;
        }

        @media (max-width: 900px) { .main-wrapper { grid-template-columns: 1fr; } }

        .glass-card { 
            background: var(--card-bg); backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 35px; padding: 40px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.8); position: relative; overflow: hidden;
        }

        /* تصميم بطاقة الراتب */
        .salary-card {
            background: linear-gradient(135deg, #1a1f2c 0%, #0a0d14 100%);
            border-radius: 25px; padding: 30px; margin-bottom: 30px;
            border-left: 5px solid var(--gold); position: relative;
        }

        h1 { font-weight: 900; font-size: 2.5rem; color: var(--gold); margin: 0 0 10px; text-shadow: 0 0 20px var(--gold-glow); }
        
        .main-input { 
            width: 100%; background: transparent; border: none; border-bottom: 2px solid #2d3446;
            color: var(--gold); font-size: 2.2rem; text-align: center; padding: 10px;
            transition: 0.3s; font-weight: 700;
        }
        .main-input:focus { border-bottom-color: var(--gold); outline: none; }

        /* الأشرطة المطورة */
        .control-item { margin-top: 30px; }
        .label-row { display: flex; justify-content: space-between; font-size: 1.1rem; margin-bottom: 15px; }
        
        input[type="range"] { 
            -webkit-appearance: none; width: 100%; height: 6px; border-radius: 5px; 
            background: #1e293b; outline: none;
        }
        input[type="range"]::-webkit-slider-thumb { 
            -webkit-appearance: none; width: 26px; height: 26px; background: var(--gold); 
            border-radius: 50%; cursor: pointer; box-shadow: 0 0 15px var(--gold);
            border: 3px solid #161b2a;
        }

        .chart-box { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .total-amount { font-size: 3rem; font-weight: 900; color: var(--gold); margin: 20px 0; }
        
        .insight-box {
            margin-top: 20px; padding: 15px; border-radius: 15px;
            background: rgba(197, 160, 89, 0.05); border: 1px dashed var(--gold);
            font-size: 0.95rem; line-height: 1.6;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<canvas id="canvas-bg"></canvas>

<div class="main-wrapper">
    <div class="glass-card">
        <h1>ريالك 💰</h1>
        <p style="opacity: 0.6; margin-bottom: 40px;">المهندس المالي الذكي</p>

        <div class="salary-card">
            <label style="font-size: 0.9rem; opacity: 0.7; display: block; margin-bottom: 10px;">إجمالي الدخل الشهري</label>
            <input type="number" id="salary" class="main-input" placeholder="0.00" oninput="update()">
        </div>

        <div class="control-item">
            <div class="label-row"><span>🏠 الأساسيات</span><span id="v1" style="color:var(--gold)">50%</span></div>
            <input type="range" id="r1" min="0" max="100" value="50" oninput="update()">
        </div>

        <div class="control-item">
            <div class="label-row"><span>📈 الاستثمار</span><span id="v2" style="color:var(--gold)">20%</span></div>
            <input type="range" id="r2" min="0" max="100" value="20" oninput="update()">
        </div>

        <div class="control-item">
            <div class="label-row"><span>🍹 نمط الحياة</span><span id="v3" style="color:var(--gold)">30%</span></div>
            <input type="range" id="r3" min="0" max="100" value="30" oninput="update()">
        </div>
    </div>

    <div class="glass-card chart-box">
        <div style="position: relative; width: 280px;">
            <canvas id="chart"></canvas>
            <div style="position: absolute; top:50%; left:50%; transform: translate(-50%, -50%);">
                <span id="pct_total" style="font-size: 2rem; font-weight: 900; color: var(--gold);">100%</span>
            </div>
        </div>
        
        <div class="total-amount" id="total_sum">0 ر.س</div>
        
        <div class="insight-box" id="insight">
            ابدأ بإدخال راتبك لتلقي التحليل المالي الذكي..
        </div>
    </div>
</div>

<script>
    // نظام الخلفية المتحركة
    const canvas = document.getElementById('canvas-bg');
    const ctx_bg = canvas.getContext('2d');
    let dots = [];
    function initBg() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        for(let i=0; i<80; i++) dots.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*2, d: Math.random()*0.5});
    }
    function drawBg() {
        ctx_bg.clearRect(0,0,canvas.width, canvas.height);
        ctx_bg.fillStyle = "rgba(212, 175, 55, 0.3)";
        dots.forEach(p => {
            ctx_bg.beginPath(); ctx_bg.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx_bg.fill();
            p.y -= p.d; if(p.y < 0) p.y = canvas.height;
        });
        requestAnimationFrame(drawBg);
    }
    initBg(); drawBg();

    // نظام الرسم البياني
    let chart;
    function initChart() {
        const ctx = document.getElementById('chart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                datasets: [{
                    data: [50, 20, 30],
                    backgroundColor: ['#d4af37', '#1a2235', '#2d3446'],
                    borderWidth: 0, cutout: '85%'
                }]
            },
            options: { animation: { duration: 800 } }
        });
    }

    function update() {
        const s = document.getElementById('salary').value || 0;
        const p1 = parseInt(document.getElementById('r1').value);
        const p2 = parseInt(document.getElementById('r2').value);
        const p3 = parseInt(document.getElementById('r3').value);
        const total = p1 + p2 + p3;

        document.getElementById('v1').innerText = p1 + "%";
        document.getElementById('v2').innerText = p2 + "%";
        document.getElementById('v3').innerText = p3 + "%";
        document.getElementById('pct_total').innerText = total + "%";
        document.getElementById('total_sum').innerText = Math.round((s * total)/100).toLocaleString() + " ر.س";

        chart.data.datasets[0].data = [p1, p2, p3];
        chart.update();

        // نظام النصائح الذكي
        const insight = document.getElementById('insight');
        if(total > 100) insight.innerHTML = "⚠️ <b>انتبه!</b> لقد تجاوزت 100% من دخلك. حاول تقليل نسب الرفاهية.";
        else if(p2 > 30) insight.innerHTML = "🌟 <b>أداء رائع!</b> نسبة استثمارك عالية جداً، أنت في طريقك للحرية المالية.";
        else insight.innerHTML = "💡 <b>نصيحة:</b> حاول دائماً إبقاء نسبة الاستثمار فوق 20% لضمان مستقبلك.";

        localStorage.setItem('ryalk_ultra', JSON.stringify({s, p1, p2, p3}));
    }

    window.onload = () => {
        initChart();
        const saved = JSON.parse(localStorage.getItem('ryalk_ultra'));
        if(saved) {
            document.getElementById('salary').value = saved.s;
            document.getElementById('r1').value = saved.p1;
            document.getElementById('r2').value = saved.p2;
            document.getElementById('r3').value = saved.p3;
        }
        update();
    };
</script>

</body>
</html>
