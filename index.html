<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ريالك - التفاعلي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main-bg: #0a0e17; --card-bg: #161b2a; --gold: #c5a059; --text: #ffffff; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--main-bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 500px; width: 100%; background: var(--card-bg); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #2d3446; }
        h1 { color: var(--gold); text-align: center; margin-bottom: 5px; }
        .salary-input { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid var(--gold); background: transparent; color: white; font-size: 1.2rem; text-align: center; margin-top: 15px; box-sizing: border-box; }
        .category { margin-top: 25px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; }
        .category label { display: flex; justify-content: space-between; margin-bottom: 10px; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: var(--gold); }
        .result-box { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; padding: 10px; background: var(--main-bg); border-radius: 8px; border-right: 4px solid var(--gold); }
        .amount { font-weight: bold; color: var(--gold); font-size: 1.1rem; }
        .warning { color: #ff4d4d; font-size: 0.9rem; text-align: center; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>ريالك 💰</h1>
        <p style="text-align: center; opacity: 0.8; margin-bottom: 20px;">وزّع راتبك على كيفك</p>

        <input type="number" id="salary" class="salary-input" placeholder="أدخل راتبك هنا..." oninput="calculate()">

        <div class="category">
            <label>
                <span>🏠 الضروريات</span>
                <span id="p1_val">50%</span>
            </label>
            <input type="range" id="p1" min="0" max="100" value="50" oninput="calculate()">
            <div class="result-box">
                <span>المبلغ:</span>
                <span id="res1" class="amount">0 ر.س</span>
            </div>
        </div>

        <div class="category">
            <label>
                <span>📈 الادخار</span>
                <span id="p2_val">20%</span>
            </label>
            <input type="range" id="p2" min="0" max="100" value="20" oninput="calculate()">
            <div class="result-box">
                <span>المبلغ:</span>
                <span id="res2" class="amount">0 ر.س</span>
            </div>
        </div>

        <div class="category">
            <label>
                <span>☕ الترفيه</span>
                <span id="p3_val">30%</span>
            </label>
            <input type="range" id="p3" min="0" max="100" value="30" oninput="calculate()">
            <div class="result-box">
                <span>المبلغ:</span>
                <span id="res3" class="amount">0 ر.س</span>
            </div>
        </div>

        <p id="total_warning" class="warning">تنبيه: مجموع النسب تجاوز 100%!</p>
    </div>

    <script>
        function calculate() {
            let s = document.getElementById('salary').value || 0;
            let n1 = parseInt(document.getElementById('p1').value);
            let n2 = parseInt(document.getElementById('p2').value);
            let n3 = parseInt(document.getElementById('p3').value);

            // تحديث نصوص النسب
            document.getElementById('p1_val').innerText = n1 + "%";
            document.getElementById('p2_val').innerText = n2 + "%";
            document.getElementById('p3_val').innerText = n3 + "%";

            // حساب المبالغ
            document.getElementById('res1').innerText = ((s * n1) / 100).toLocaleString() + " ر.س";
            document.getElementById('res2').innerText = ((s * n2) / 100).toLocaleString() + " ر.س";
            document.getElementById('res3').innerText = ((s * n3) / 100).toLocaleString() + " ر.س";

            // تنبيه إذا النسب تعدت الـ 100
            let total = n1 + n2 + n3;
            document.getElementById('total_warning').style.display = total > 100 ? 'block' : 'none';
        }
    </script>
</body>
</html>
