<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ريالك</title>
    <style>
        body { font-family: sans-serif; background: #1a1a2e; color: white; text-align: center; padding: 20px; }
        .box { background: white; color: #1a1a2e; padding: 20px; border-radius: 20px; max-width: 400px; margin: auto; }
        input { width: 80%; padding: 10px; margin: 10px; border-radius: 10px; border: 1px solid #ccc; }
        .item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        .btn { background: #c5a059; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>ريالك 💰</h1>
    <div class="box">
        <label>دخل الراتب:</label>
        <input type="number" id="sal" placeholder="مثلاً 10000" oninput="calc()">
        <div id="list">
            <div class="item"><span>الضروريات (50%)</span> <b id="a1">0</b></div>
            <div class="item"><span>الادخار (20%)</span> <b id="a2">0</b></div>
            <div class="item"><span>الترفيه (10%)</span> <b id="a3">0</b></div>
            <div class="item"><span>أخرى (20%)</span> <b id="a4">0</b></div>
        </div>
    </div>

    <script>
        function calc() {
            let s = document.getElementById('sal').value || 0;
            document.getElementById('a1').innerText = (s * 0.5) + ' ر.س';
            document.getElementById('a2').innerText = (s * 0.2) + ' ر.س';
            document.getElementById('a3').innerText = (s * 0.1) + ' ر.س';
            document.getElementById('a4').innerText = (s * 0.2) + ' ر.س';
        }
    </script>
</body>
</html>
